  .content h3 { font-size:13px; color:#e2e8f0; margin-top:16px; }

const MODULES = [{"module_id": "M1_100pct_UT", "title_ko": "Measure 1 — 건조 중 100% NDE (UT)", "title_en": "Measure 1 — 100% NDE (UT) During Construction", "measure_ids": [1], "difficulty": "basic", "content_md": "# Measure 1 — 건조 중 100% NDE (UT)\n\n**Measure 1 — 100% NDE (UT) During Construction**\n\n- LR Reference: `Pt 4, Ch 8, 2.3.8`\n- Project: `PROJ-2026-HC-001`\n- Applicability for this case: **Required**\n\n## 학습 목표 (Learning Objectives)\n\n- **KO:** NDE (비파괴검사, NDT) Measure 1의 적용 조건을 설명할 수 있다.\n  **EN:** Explain when NDE (Non-Destructive Examination / NDT) Measure 1 applies.\n- **KO:** 적용 범위(joint type, zone, construction vs in-service)를 구분할 수 있다.\n  **EN:** Distinguish scope: joint type, zone, construction vs in-service stage.\n- **KO:** Table 8.2.1 및 Pt 4, Ch 8, 2.3.8 근거를 인용할 수 있다.\n  **EN:** Cite Table 8.2.1 and Pt 4, Ch 8, 2.3.8.\n\n## 규칙 요약 (Rule Summary)\n\n**KO:** 화물창 구역 내 상부 플랜지 종재의 block-to-block butt 용접에 건조 중 100% 초음파 탐상(UT)을 실시합니다.\n\n**EN:** 100% ultrasonic testing during construction on all block-to-block butt joints of upper flange longitudinal members in the cargo hold region.\n\n## 용어 (Terminology)\n\n- **NDE** — Non-Destructive Examination (LR terminology)\n- **NDT** — Non-Destructive Testing (비파괴검사)\n- **UT** — Ultrasonic Testing (초음파 탐상)\n", "quiz_ids": ["Q-M1-001"]}, {"module_id": "M2_in_service_NDE", "title_ko": "Measure 2 — 운항 중 주기적 NDE", "title_en": "Measure 2 — Periodic In-Service NDE", "measure_ids": [2], "difficulty": "intermediate", "content_md": "# Measure 2 — 운항 중 주기적 NDE\n\n**Measure 2 — Periodic In-Service NDE**\n\n- LR Reference: `Pt 4, Ch 8, 2.3.10(d)`\n- Project: `PROJ-2026-HC-001`\n- Applicability for this case: **Conditional**\n\n## 학습 목표 (Learning Objectives)\n\n- **KO:** NDE (비파괴검사, NDT) Measure 2의 적용 조건을 설명할 수 있다.\n  **EN:** Explain when NDE (Non-Destructive Examination / NDT) Measure 2 applies.\n- **KO:** 적용 범위(joint type, zone, construction vs in-service)를 구분할 수 있다.\n  **EN:** Distinguish scope: joint type, zone, construction vs in-service stage.\n- **KO:** Table 8.2.1 및 Pt 4, Ch 8, 2.3.10(d) 근거를 인용할 수 있다.\n  **EN:** Cite Table 8.2.1 and Pt 4, Ch 8, 2.3.10(d).\n\n## 규칙 요약 (Rule Summary)\n\n**KO:** Measure 3을 enhanced NDE로 충족한 경우 Note 2에 따라 운항 중 주기적 NDE가 요구될 수 있습니다. 빈도와 범위는 LR과 협의합니다.\n\n**EN:** Periodic NDE during service may be required per Note 2 when Measure 3 is achieved via enhanced NDE. Frequency and extent agreed with LR.\n\n## 추출된 NDT 조항 (Extracted NDT Clauses)\n\n### `measure_2_in_service`\n- Coverage: **periodic**\n- Scope: In-service NDE; frequency and extent agreed with LR\n- Rule ref: `Pt 4, Ch 8, 2.3.10(d)`\n\n> Note 2: Where enhanced NDE is adopted as Measure 3, periodic in-service NDE (Measure 2) may be required. The frequency and extent to be agreed with LR.\n\n## 판단 시나리오 (Decision Scenarios)\n\n| Measure 3 option | Measure 2 applicable? |\n|------------------|----------------------|\n| block_shift | No — Note 2 not triggered |\n| crack_arrest_hole | No |\n| crack_arrest_insert | No |\n| enhanced_NDE | Yes — Conditional (Note 2) |\n\n## 용어 (Terminology)\n\n- **NDE** — Non-Destructive Examination (LR terminology)\n- **NDT** — Non-Destructive Testing (비파괴검사)\n- **UT** — Ultrasonic Testing (초음파 탐상)\n", "quiz_ids": ["Q-M2-NOTE2-001"]}, {"module_id": "M3_enhanced_NDE", "title_ko": "Measure 3 — Enhanced NDE", "title_en": "Measure 3 — Enhanced NDE with Stricter Acceptance", "measure_ids": [3], "difficulty": "advanced", "content_md": "# Measure 3 — Enhanced NDE\n\n**Measure 3 — Enhanced NDE with Stricter Acceptance**\n\n- LR Reference: `Pt 4, Ch 8, 2.3.10(d)`\n- Project: `PROJ-2026-HC-001`\n- Applicability for this case: **Required**\n\n## 학습 목표 (Learning Objectives)\n\n- **KO:** NDE (비파괴검사, NDT) Measure 3의 적용 조건을 설명할 수 있다.\n  **EN:** Explain when NDE (Non-Destructive Examination / NDT) Measure 3 applies.\n- **KO:** 적용 범위(joint type, zone, construction vs in-service)를 구분할 수 있다.\n  **EN:** Distinguish scope: joint type, zone, construction vs in-service stage.\n- **KO:** Table 8.2.1 및 Pt 4, Ch 8, 2.3.10(d) 근거를 인용할 수 있다.\n  **EN:** Cite Table 8.2.1 and Pt 4, Ch 8, 2.3.10(d).\n\n## 규칙 요약 (Rule Summary)\n\n**KO:** ShipRight 절차에 따른 엄격한 수용 기준의 enhanced NDE. CTOD ≥ 0.18 mm (최저 설계온도). EGW 용접 금지.\n\n**EN:** Enhanced NDE with stricter acceptance criteria per ShipRight. CTOD ≥ 0.18 mm at minimum design temperature. EGW not permitted.\n\n## 추출된 NDT 조항 (Extracted NDT Clauses)\n\n### `measure_3_ctod`\n- Scope: CTOD at minimum design temperature\n- Rule ref: `Pt 4, Ch 8, 2.3.10(d)`\n\n> Where enhanced NDE is adopted as Measure 3, CTOD value shall not be less than 0.18 mm at the minimum design temperature.\n\n### `measure_3_acceptance`\n- Coverage: **enhanced**\n- Scope: ShipRight stricter acceptance criteria\n- Rule ref: `ShipRight procedures`\n\n> Enhanced NDE shall comply with stricter acceptance criteria in accordance with ShipRight procedures.\n\n### `egw_prohibition`\n- Scope: Electrogas welding prohibited when enhanced NDE required\n- Rule ref: `Pt 4, Ch 8, 2.3.10(d)`\n\n> Electrogas welding (EGW) is not permitted where enhanced NDE is required as Measure 3.\n\n### `measure_3_enhanced_nde`\n- Coverage: **enhanced**\n- Scope: Stricter NDE acceptance criteria per ShipRight\n- Rule ref: `Pt 4, Ch 8, 2.3.10(d)`\n\n> enhanced NDE is adopted as Measure 3, CTOD value shall not be less than 0.\n\n## CTOD 요건 (CTOD Requirement)\n\n> CTOD value shall not be less than **0.18 mm** at the minimum design temperature.\n\n**Note:** CTOD is part of Measure 3 enhanced NDE, **not** Measure 2.\n\n## 용어 (Terminology)\n\n- **NDE** — Non-Destructive Examination (LR terminology)\n- **NDT** — Non-Destructive Testing (비파괴검사)\n- **UT** — Ultrasonic Testing (초음파 탐상)\n", "quiz_ids": ["Q-M2-NOTE2-001", "Q-M3-CTOD-TF-001", "Q-M3-EGW-001", "Q-M3-METHOD-001"]}, {"module_id": "M3_enhanced_NDE_CTOD", "title_ko": "Measure 3 — CTOD 요건", "title_en": "Measure 3 — CTOD Requirement", "measure_ids": [3], "difficulty": "advanced", "content_md": "# Measure 3 — CTOD 요건\n\n**Measure 3 — C n**EN:** LR requirements for approval, qualification, and audit of firms (service suppliers) providing NDT services.\n\n## 추출된 조항 (Extracted Clauses)\n\n### 1. `ndt_service_supplier_01`\n- Methods: **-**\n\n> Firms engaged in non-destructive testing services shall be approved as service\nsuppliers by LR, subject to periodic audit.\n\n## 용어 (Terminology)\n\n- **NDE / NDT** — Non-Destructive Examination / Testing (비파괴검사)\n- **UT** Ultrasonic · **RT** Radiographic · **MT** Magnetic Particle\n- **PT** Liquid Penetrant · **VT** Visual · **ET** Eddy Current\n", "quiz_ids": ["Q-SS-001"]}, {"module_id": "NDT_qualification", "title_ko": "검사원·절차 자격 (Qualification)", "title_en": "Personnel & Procedure Qualification", "measure_ids": [], "difficulty": "intermediate", "content_md": "# 검사원·절차 자격 (Qualification)\n\n**Personnel & Procedure Qualification**\n\n- Project: `PROJ-2026-HC-001`\n- Category: `qualification`\n- Extracted clauses: **1**\n\n## 개요 (Overview)\n\n**KO:** 검사원 자격(ISO 9712, SNT-TC-1A, Level II/III) 및 절차 승인 요건.\n\n**EN:** Personnel qualification (ISO 9712, SNT-TC-1A, Level II/III) and procedure approval.\n\n## 추출된 조항 (Extracted Clauses)\n\n### 1. `ndt_qualification_01`\n- Methods: **-**\n\n> NDT personnel shall be qualified and certified to ISO 9712 Level II or III.\n\n## 용어 (Terminology)\n\n- **NDE / NDT** — Non-Destructive Examination / Testing (비파괴검사)\n- **UT** Ultrasonic · **RT** Radiographic · **MT** Magnetic Particle\n- **PT** Liquid Penetrant · **VT** Visual · **ET** Eddy Current\n", "quiz_ids": ["Q-QUAL-001"]}, {"module_id": "NDT_survey", "title_ko": "선체 검사 체크포인트 (Hull Survey Checkpoints)", "title_en": "Hull Survey Checkpoints", "measure_ids": [], "difficulty": "advanced", "content_md": "# 선체 검사 체크포인트 (Hull Survey Checkpoints)\n\n**Hull Survey Checkpoints**\n\n- Project: `PROJ-2026-HC-001`\n- Category: `survey`\n- Extracted clauses: **1**\n\n## 개요 (Overview)\n\n**KO:** 정기/중간/특별검사, close-up survey, 두께 계측 등 운항 중 선체 검사에서의 NDT 위치 및 범위.\n\n**EN:** NDT locations an let activeId = MODULES.length ? MODULES[0].module_id : null;

function mdToHtml(md){
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = (md||'').split('\n');
  let html=[], inUl=false, inTable=false;
  const closeUl=()=>{ if(inUl){html.push('</ul>');inUl=false;} };
  const closeTable=()=>{ if(inTable){html.push('</table>');inTable=false;} };
  const inline = t => esc(t)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
  for(let raw of lines){
    let line=raw.replace(/\s+$/,'');
    if(/^\s*\|(.+)\|\s*$/.test(line)){
      const cells=line.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      if(cells.every(c=>/^:?-+:?$/.test(c))) continue;
      if(!inTable){ html.push('<table>'); inTable=true; }
      const tag = 'td';
      html.push('<tr>'+cells.map(c=>`<${tag}>${inline(c)}</${tag}>`).join('')+'</tr>');
      continue;
    } else closeTable();
    if(/^### /.test(line)){ closeUl(); html.push('<h3>'+inline(line.slice(4))+'</h3>'); }
    else if(/^## /.test(line)){ closeUl(); html.push('<h2>'+inline(line.slice(3))+'</h2>'); }
    else if(/^# /.test(line)){ closeUl(); html.push('<h1>'+inline(line.slice(2))+'</h1>'); }
    else if(/^> /.test(line)){ closeUl(); html.push('<blockquote>'+inline(line.slice(2))+'</blockquote>'); }
    else if(/^---+$/.test(line)){ closeUl(); html.push('<hr>'); }
    else if(/^\s*[-*] /.test(line)){ if(!inUl){html.push('<ul>');inUl=true;} html.push('<li>'+inline(line.replace(/^\s*[-*] /,''))+'</li>'); }
    else if(line.trim()===''){ closeUl(); }
    else { closeUl(); html.push('<p>'+inline(line)+'</p>'); }
  }
  closeUl(); closeTable();
  return html.join('\n');
}

function quizzesForModule(mod){
  return QUIZZES.filter(q => q.module_id===mod.module_id ||
    (q.measure_ids && q.measure_ids.length && mod.measure_ids &&
     q.measure_ids.some(id=>mod.measure_ids.includes(id))));
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='<h2>Modules ('+MODULES.length+')</h2>';
  MODULES.forEach(m=>{
    const b=document.createElement('button');
    b.className='mod-btn'+(m.module_id===activeId?' active':'');
    const mids = (m.measure_ids&&m.measure_ids.length)? m.measure_ids.map(x=>'M'+x).join(' ') : 'General';
    b.innerHTML=`<div>${m.title_ko}</div><div class="t2">${m.title_en}</div>
      <div class="tags"><span class="tag">${m.difficulty}</span><span class="tag">${mids}</span></div>`;
    b.onclick=()=>{ activeId=m.module_id; render(); };
    sb.appendChild(b);
  });
}

function renderQuiz(mod){
  const list=document.getElementById('quizList');
  const qs=quizzesForModule(mod);
  document.querySelector('#quiz h2').textContent='Quiz ('+qs.length+')';
  list.innerHTML='';
  if(!qs.length){ list.innerHTML='<div style="font-size:11px;color:#7c8aa3">이 모듈에는 퀴즈가 없습니다.</div>'; return; }
  qs.forEach(q=>{
    const card=document.createElement('div'); card.className='q-card';
    card.innerHTML=`<div class="q-q">${q.question_ko}</div><div class="q-en">${q.question_en}</div>`;
    let answered=false;
    q.options.forEach(opt=>{
      const ob=document.createElement('button'); ob.className='opt'; ob.textContent=opt;
      ob.onclick=()=>{
        if(answered) return; answered=true;
        const correct = opt===q.correct_answer;
        card.querySelectorAll('.opt').forEach(o=>{
          if(o.textContent===q.correct_answer) o.classList.add('ok');
          else if(o===ob) o.classList.add('bad');
        });
        const e=document.createElement('div');
        e.className='expl '+(correct?'ok':'bad');
        e.innerHTML=(correct?'정답 ✓':'오답 ✗')+'<br>'+(q.explanation_ko||'')+'<br><span style="opacity:.7">'+(q.explanation_en||'')+'</span>'+
          (q.rule_ref?'<br><span class="badge">'+q.rule_ref+'</span>':'');
        card.appendChild(e);
      };
      card.appendChild(ob);
    });
    list.appendChild(card);
  });
}

function render(){
  renderSidebar();
  const mod=MODULES.find(m=>m.module_id===activeId);
  const c=document.getElementById('content');
  if(!mod){ c.innerHTML='<p>No modules.</p>'; return; }
  c.innerHTML=mdToHtml(mod.content_md);
  renderQuiz(mod);
}
render();
</script>
